# Use the official Playwright image which includes Node.js and browser dependencies
FROM mcr.microsoft.com/playwright:v1.49.0-noble

# Set the working directory
WORKDIR /app

# Copy package files and install dependencies
COPY package*.json ./
RUN npm install

# Copy the rest of your application code (Frontend + Scraper)
COPY . .

# Build the Tailwind v4 / Vite production asset bundle
RUN npm run build

# Expose the port your UI application runs on
EXPOSE 5173

# Start the application
CMD ["npm", "run", "preview", "--", "--host"]
