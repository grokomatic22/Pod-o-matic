version: '3.8'

services:
  aria-visualizer:
    # This specifies the base image correctly in Compose format
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    
    # Keeps the container running and mounts the dev workspace
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspaces/${localWorkspaceFolderBasename}:cached
    environment:
      - NODE_ENV=development
